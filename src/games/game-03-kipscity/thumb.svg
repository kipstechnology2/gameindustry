<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Kips City">
  <defs>
    <linearGradient id="kc-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd0a3"/>
      <stop offset="50%" stop-color="#ffb5a0"/>
      <stop offset="100%" stop-color="#9c88c5"/>
    </linearGradient>
    <linearGradient id="kc-grass-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9bd66f"/>
      <stop offset="100%" stop-color="#6aa84f"/>
    </linearGradient>
    <linearGradient id="kc-grass-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86c956"/>
      <stop offset="100%" stop-color="#5a9c43"/>
    </linearGradient>
    <linearGradient id="kc-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ed4ee"/>
      <stop offset="100%" stop-color="#4a9ec8"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="320" height="120" fill="url(#kc-sky)"/>

  <!-- Sun -->
  <circle cx="62" cy="58" r="22" fill="#ffe9a3" opacity="0.9"/>
  <circle cx="62" cy="58" r="14" fill="#fff5cb"/>

  <!-- Distant clouds -->
  <ellipse cx="220" cy="40" rx="24" ry="6" fill="#fff" opacity="0.55"/>
  <ellipse cx="245" cy="48" rx="18" ry="5" fill="#fff" opacity="0.45"/>

  <!-- Isometric grass tiles -->
  <g transform="translate(160, 110)">
    <!-- back rows -->
    <polygon points="0,-30 32,-14 0,2 -32,-14" fill="url(#kc-grass-a)"/>
    <polygon points="32,-14 64,2 32,18 0,2" fill="url(#kc-grass-b)"/>
    <polygon points="-32,-14 0,2 -32,18 -64,2" fill="url(#kc-grass-b)"/>
    <polygon points="64,2 96,18 64,34 32,18" fill="url(#kc-grass-a)"/>
    <polygon points="-64,2 -32,18 -64,34 -96,18" fill="url(#kc-grass-a)"/>
    <polygon points="0,2 32,18 0,34 -32,18" fill="url(#kc-grass-b)"/>
    <!-- water in front-left -->
    <polygon points="-32,18 0,34 -32,50 -64,34" fill="url(#kc-water)"/>
    <polygon points="-64,34 -32,50 -64,66 -96,50" fill="url(#kc-water)"/>
    <!-- path tiles -->
    <polygon points="32,18 64,34 32,50 0,34" fill="#d6c197"/>
    <polygon points="64,34 96,50 64,66 32,50" fill="#d6c197"/>
  </g>

  <!-- Tiny house silhouette -->
  <g transform="translate(170, 78)">
    <polygon points="0,0 18,-12 36,0 36,18 0,18" fill="#f7c873"/>
    <polygon points="0,0 18,-12 36,0 18,8" fill="#e0985b"/>
    <rect x="14" y="6" width="8" height="12" fill="#774a25"/>
  </g>

  <!-- Title -->
  <text x="20" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="#fff" letter-spacing="0.5">Kips City</text>
  <text x="20" y="48" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#fff8" letter-spacing="2">LIFE SIMULATION</text>
</svg>
